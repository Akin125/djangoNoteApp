services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noteapp_web
    command: sh -c "python manage.py wait_for_db && python manage.py migrate && python manage.py create_superuser && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./NoteApp:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
